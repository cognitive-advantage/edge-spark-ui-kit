{{ define "partials/breadcrumbs.html" }}
<nav aria-label="Breadcrumb" class="mb-4">
    <ol class="flex items-center gap-2 text-sm text-grey-600">
        {{ range $index, $item := .Breadcrumbs }}
            {{ if gt $index 0 }}
                <li>/</li>
            {{ end }}
            <li>
                {{ if $item.Path }}
                    <a href="{{ $item.Path }}" class="hover:text-grey-900">{{ $item.Label }}</a>
                {{ else }}
                    <span class="text-grey-900">{{ $item.Label }}</span>
                {{ end }}
            </li>
        {{ end }}
    </ol>
</nav>
{{ end }}
